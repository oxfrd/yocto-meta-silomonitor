<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Silo Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .header h1 { 
            font-size: 2.5em; 
            background: linear-gradient(45deg, #00d4ff, #7b68ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .grid { display: grid; grid-template-columns: 1fr ; gap: 20px; }
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .btn {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }
        .btn-success { background: linear-gradient(45deg, #11998e, #38ef7d); }
        .sensors-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; }
        .sensor { 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-radius: 12px; 
            min-width: 220px;
            border-left: 4px solid #667eea;
        }
        .sensor.unassigned { border-left-color: #ff6b6b; opacity: 0.7; }
        .temp { font-size: 2em; font-weight: bold; color: #00d4ff; }
        .temp.critical { color: #ff4757; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #chart-container { height: 400px; margin-top: 20px; }
        .form-group { margin: 10px 0; }
        .form-group label { display: block; margin-bottom: 5px; color: #b0b0b0; }
        .form-group input { 
            width: 100%; padding: 10px; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
        }
        .form-group input::placeholder { color: #888; }
        .status { padding: 10px; border-radius: 8px; margin: 10px 0; }
        .status.new { background: rgba(255, 193, 7, 0.2); border: 1px solid #ffc107; }
        .status.saved { background: rgba(40, 167, 69, 0.2); border: 1px solid #28a745; }

        .silo-visual { 
            position: relative !important;  /* MUSI być relative */
            width: 500px;                  /* STAŁA szerokość */
            height: 600px;
            margin: 0 auto;
        }

        /* UTRWAL etykiety */
        .temp-label {
            position: absolute !important;
            transform: translateX(-13%);   /* wyśrodkuj poziomo */
            white-space: nowrap;
        }

        /* Blokada przesuwania obrazka */
        #silo-outline {
            position: absolute !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 90% !important;
        }

        .sensor strong {
        font-family: monospace;  /* Monospace dla adresów DS18B20 */
        font-size: 0.9em;
        word-break: break-all;   /* Zawijanie długich adresów */
        display: block;
        margin-bottom: 8px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('silo')">Silo - Live Temperatures</button>
            <button class="tab-btn" onclick="switchTab('sensors')">Sensors</button>
        </div>

        <div id="silo-tab" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <div class="silo-visual" style="position: relative; height: 600px; margin-bottom: 20px; background: transparent;">
                        <!-- Silo image with transparent background - OUTLINE ONLY -->
                        <img src="./files/silo-img.png" 
                            id="silo-outline"
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1; mix-blend-mode: multiply; opacity: 0.5;">
                        <!-- Temperature labels - ADJUST RELATIVE POSITIONS -->
                        <div class="temp-label" style="position: absolute; top: 15%; left: 10%; z-index: 10;">
                            <div class="temp-display" id="5m-temp" style="font-size: 2em; font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; min-width: 80px; text-align: center;">--°C</div>
                            <div class="label" style="font-size: 1.2em; font-weight: bold; margin-top: 10px; color: #ccc;">5m</div>
                        </div>
                        <div class="temp-label" style="position: absolute; top: 45%; left: 10%; z-index: 10;">
                            <div class="temp-display" id="3m-temp" style="font-size: 2em; font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; min-width: 80px; text-align: center;">--°C</div>
                            <div class="label" style="font-size: 1.2em; font-weight: bold; margin-top: 10px; color: #ccc;">3m</div>
                        </div>
                        <div class="temp-label" style="position: absolute; top: 75%; left: 10%; z-index: 10;">
                            <div class="temp-display" id="1m-temp" style="font-size: 2em; font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; min-width: 80px; text-align: center;">--°C</div>
                            <div class="label" style="font-size: 1.2em; font-weight: bold; margin-top: 10px; color: #ccc;">1m</div>
                        </div>
                        <!-- Ambient temperature below labels -->
                        <div style="position: absolute; left: 0; right: 0; bottom: -50px; text-align: left; z-index: 10;">
                            <span style="display: inline-block; background: rgba(0,0,0,0.6); color: #e0e0e0; font-size: 1.3em; font-weight: 600; padding: 8px 18px; border-radius: 10px; margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
                                🌡️ Ambient temperature: <span id="ambient-temp">--°C</span>
                            </span>
                        </div>
                    </div>
                    <!-- Small chart below -->
                    <div style="height: 250px; margin-top: 80px;">
                        <canvas id="chart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div id="sensors-tab" class="tab-content">
            <div class="grid">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2>Detected Sensors</h2>
                        <button onclick="scanSensors()" style="padding: 10px 20px; background: #00d4ff; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Scan</button>
                    </div>
                    <div id="status" class="status"></div>
                    <div id="sensors-list" style="display: grid; gap: 10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .nav-tabs {
            display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #00d4ff;
        }
        .tab-btn {
            padding: 10px 20px; background: transparent; color: #ccc; border: none; font-size: 1em; cursor: pointer; border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: #00d4ff; border-bottom-color: #00d4ff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        let chart;
        const ctx = document.getElementById('chart').getContext('2d');
        
        // Inicjalizacja wykresu
        chart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [] },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: false, grid: { color: 'rgba(255,255,255,0.1)' } },
                    x: { grid: { color: 'rgba(255,255,255,0.1)' } }
                },
                plugins: { legend: { labels: { color: '#e0e0e0' } } },
                backgroundColor: 'rgba(255,255,255,0.05)'
            }
        });

        async function scanSensors() {
            try {
                document.getElementById('status').textContent = 'Skanowanie...';
                document.getElementById('status').className = 'status';
                
                const response = await fetch('http://127.0.0.1:5000/api/scan');
                const sensors = await response.json();
                
                renderSensors(sensors);
                updateChart(sensors);
                document.getElementById('status').textContent = `${sensors.length} czujników znalezionych`;
                document.getElementById('status').className = 'status new';
            } catch(e) {
                document.getElementById('status').textContent = 'Błąd skanowania';
                document.getElementById('status').className = 'status';
            }
        }

        function renderSensors(sensors) {
            const container = document.getElementById('sensors-list');
            container.innerHTML = sensors.map(sensor => `
                <div class="sensor ${sensor.assigned ? '' : 'unassigned'}">
                    <!-- PEŁNY ADRES DS18B20 zamiast skróconego -->
                    <div><strong>📍 ${sensor.id}</strong></div>
                    <div class="temp ${!isNaN(sensor.temp) && (sensor.temp < -10 || sensor.temp > 50) ? 'critical' : ''}">
                        ${isNaN(sensor.temp) ? '--' : sensor.temp.toFixed(1)}°C
                    </div>
                    ${sensor.assigned ? 
                        `<div>✅ ${sensor.name} (${sensor.position}m)</div>` : 
                        `<div>
                            <div class="form-group">
                                <label>📝 Nazwa:</label>
                                <input id="name-${sensor.id}" placeholder="Silo 1 - 5m">
                            </div>
                            <div class="form-group">
                                <label>📏 Wysokość (m):</label>
                                <input id="pos-${sensor.id}" type="number" step="0.1" min="0" max="10" placeholder="5.0">
                            </div>
                            <div class="form-group">
                                <label>🚨 Alarm MIN:</label>
                                <input id="min-${sensor.id}" type="number" step="0.5" value="-5" placeholder="-5">
                            </div>
                            <div class="form-group">
                                <label>🚨 Alarm MAX:</label>
                                <input id="max-${sensor.id}" type="number" step="0.5" value="40" placeholder="40">
                            </div>
                            <button onclick="assignSensor('${sensor.id}')" class="btn btn-success">💾 Zapisz</button>
                        </div>`
                    }
                </div>
            `).join('');
        }

        async function assignSensor(id) {
            const name = document.getElementById(`name-${id}`).value || `Sensor ${id.slice(-8)}`;
            const position = parseFloat(document.getElementById(`pos-${id}`).value) || 0;
            const alarm_min = parseFloat(document.getElementById(`min-${id}`).value) || -5;
            const alarm_max = parseFloat(document.getElementById(`max-${id}`).value) || 40;
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/assign', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, name, position, alarm_min, alarm_max})
                });
                
                if (response.ok) {
                    document.getElementById('status').textContent = `✅ ${name} zapisany!`;
                    document.getElementById('status').className = 'status saved';
                    setTimeout(scanSensors, 1000);
                }
            } catch(e) {
                document.getElementById('status').textContent = '❌ Błąd zapisu';
                document.getElementById('status').className = 'status';
            }
        }

        function updateChart(sensors) {
            const now = new Date().toLocaleTimeString();
            chart.data.labels = sensors.map(s => s.id.slice(-8));
            chart.data.datasets = [{
                label: 'Temperatura (°C)',
                data: sensors.map(s => s.temp || 0),
                borderColor: '#00d4ff',
                backgroundColor: 'rgba(0,212,255,0.1)',
                tension: 0.4,
                fill: true
            }];
            chart.update('none');

            // Przykład: pobierz temp. otoczenia z czujnika o nazwie "ambient" lub innego źródła
            const ambient = sensors.find(s => s.name && s.name.toLowerCase().includes('ambient') || s.id.toLowerCase().includes('ambient'));
            document.getElementById('ambient-temp').textContent = ambient && !isNaN(ambient.temp) ? ambient.temp.toFixed(1) + '°C' : '--°C';
            const _1m = sensors.find(s => s.name && s.name.toLowerCase().includes('1m'));
            document.getElementById('1m-temp').textContent = _1m && !isNaN(_1m.temp) ? _1m.temp.toFixed(1) + '°C' : '--°C';
            const _3m = sensors.find(s => s.name && s.name.toLowerCase().includes('3m'));
            document.getElementById('3m-temp').textContent = _3m && !isNaN(_3m.temp) ? _3m.temp.toFixed(1) + '°C' : '--°C';
            const _5m = sensors.find(s => s.name && s.name.toLowerCase().includes('5m'));
            document.getElementById('5m-temp').textContent = _5m && !isNaN(_5m.temp) ? _5m.temp.toFixed(1) + '°C' : '--°C';

        }

        // Auto-refresh co 5s
        setInterval(scanSensors, 5000);
        scanSensors(); // pierwszy skan
    </script>
</body>
</html>
