<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Silo Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .header h1 { 
            font-size: 2.5em; 
            background: linear-gradient(45deg, #00d4ff, #7b68ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .grid { display: grid; grid-template-columns: 1fr ; gap: 20px; }
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .btn {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }
        .btn-success { background: linear-gradient(45deg, #11998e, #38ef7d); }
        .sensors-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; }
        .sensor { 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-radius: 12px; 
            min-width: 220px;
            border-left: 4px solid #667eea;
        }
        .sensor.unassigned { border-left-color: #ff6b6b; opacity: 0.7; }
        .temp { font-size: 2em; font-weight: bold; color: #00d4ff; }
        .temp.critical { color: #ff4757; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #chart-container { height: 400px; margin-top: 20px; }
        .form-group { margin: 10px 0; }
        .form-group label { display: block; margin-bottom: 5px; color: #b0b0b0; }
        .form-group input { 
            width: 100%; padding: 10px; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
        }
        .form-group input::placeholder { color: #888; }
        .status { padding: 10px; border-radius: 8px; margin: 10px 0; }
        .status.new { background: rgba(255, 193, 7, 0.2); border: 1px solid #ffc107; }
        .status.saved { background: rgba(40, 167, 69, 0.2); border: 1px solid #28a745; }

        .silo-visual { 
            position: relative !important;  /* MUSI być relative */
            width: 500px;                  /* STAŁA szerokość */
            height: 600px;
            margin: 0 auto;
        }

        /* UTRWAL etykiety */
        .temp-label {
            position: absolute !important;
            transform: translateX(-13%);   /* wyśrodkuj poziomo */
            white-space: nowrap;
        }

        /* Blokada przesuwania obrazka */
        #silo-outline {
            position: absolute !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 90% !important;
        }

        .sensor strong {
        font-family: monospace;  /* Monospace dla adresów DS18B20 */
        font-size: 0.9em;
        word-break: break-all;   /* Zawijanie długich adresów */
        display: block;
        margin-bottom: 8px;
        }

        .temp-display {
            transition: color 0.3s ease;
        }

        .temp-display.critical {
            color: #ff4757 !important;
            animation: pulse 1s infinite;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('silo')">Silo</button>
            <button class="tab-btn" onclick="switchTab('sensors')">Sensors</button>
            <button class="tab-btn" onclick="switchTab('settings')">⚙️ Ustawienia</button>
        </div>

        <div id="silo-tab" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <div class="silo-visual" style="position: relative; height: 600px; margin-bottom: 20px; background: transparent;">
                        <!-- Silo image with transparent background - OUTLINE ONLY -->
                        <img src="./silo-img.png" 
                            id="silo-outline"
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1; mix-blend-mode: multiply; opacity: 0.5;">
                        <!-- Temperature labels - ADJUST RELATIVE POSITIONS -->
                        <div class="temp-label" style="position: absolute; top: 15%; left: 10%; z-index: 10;">
                            <div class="temp-display" id="5m-temp" style="font-size: 2em; font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; min-width: 80px; text-align: center;">--°C</div>
                            <div class="label" style="font-size: 1.2em; font-weight: bold; margin-top: 10px; color: #ccc;">5m</div>
                        </div>
                        <div class="temp-label" style="position: absolute; top: 45%; left: 10%; z-index: 10;">
                            <div class="temp-display" id="3m-temp" style="font-size: 2em; font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; min-width: 80px; text-align: center;">--°C</div>
                            <div class="label" style="font-size: 1.2em; font-weight: bold; margin-top: 10px; color: #ccc;">3m</div>
                        </div>
                        <div class="temp-label" style="position: absolute; top: 75%; left: 10%; z-index: 10;">
                            <div class="temp-display" id="1m-temp" style="font-size: 2em; font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; min-width: 80px; text-align: center;">--°C</div>
                            <div class="label" style="font-size: 1.2em; font-weight: bold; margin-top: 10px; color: #ccc;">1m</div>
                        </div>
                        <!-- Ambient temperature below labels -->
                        <div style="position: absolute; left: 0; right: 0; bottom: -50px; text-align: left; z-index: 10;">
                            <span style="display: inline-block; background: rgba(0,0,0,0.6); color: #e0e0e0; font-size: 1.3em; font-weight: 600; padding: 8px 18px; border-radius: 10px; margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
                                🌡️ Ambient temperature: <span id="ambient-temp">--°C</span>
                            </span>
                        </div>
                    </div>
                    <!-- Charts -->
                    <div style="margin-top: 20px;">
                        <!-- Wykres 5m -->
                        <div style="height: 150px; margin-bottom: 15px; background: rgba(0,212,255,0.1); border-radius: 8px; padding: 10px;">
                            <div style="font-size: 0.9em; color: #00d4ff; margin-bottom: 5px;">📈 5m</div>
                            <canvas id="chart-5m"></canvas>
                        </div>
                        
                        <!-- Wykres 3m -->
                        <div style="height: 150px; margin-bottom: 15px; background: rgba(255,107,107,0.1); border-radius: 8px; padding: 10px;">
                            <div style="font-size: 0.9em; color: #ff6b6b; margin-bottom: 5px;">📈 3m</div>
                            <canvas id="chart-3m"></canvas>
                        </div>
                        
                        <!-- Wykres 1m -->
                        <div style="height: 150px; margin-bottom: 15px; background: rgba(243,156,18,0.1); border-radius: 8px; padding: 10px;">
                            <div style="font-size: 0.9em; color: #f39c12; margin-bottom: 5px;">📈 1m</div>
                            <canvas id="chart-1m"></canvas>
                        </div>
                        
                        <!-- Wykres otoczenia -->
                        <div style="height: 150px; background: rgba(46,204,113,0.1); border-radius: 8px; padding: 10px;">
                            <div style="font-size: 0.9em; color: #2ecc71; margin-bottom: 5px;">🌡️ Otoczenie</div>
                            <canvas id="chart-ambient"></canvas>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div id="sensors-tab" class="tab-content">
            <div class="grid">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2>Detected Sensors</h2>
                        <button onclick="scanSensors()" style="padding: 10px 20px; background: #00d4ff; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Scan</button>
                    </div>
                    <div id="status" class="status"></div>
                    <div id="sensors-list" style="display: grid; gap: 10px;"></div>
                </div>
            </div>
        </div>
        <div id="settings-tab" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>🎯 Przypisz sensory do pozycji silosu</h2>
                    <div style="margin: 20px 0;">
                        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
                            <!-- Pozycje silosu -->
                            <div>
                                <h3 style="color: #00d4ff;">📍 Pozycje silosu</h3>
                                <div style="margin: 15px 0;">
                                    <label>5m (góra):</label>
                                    <select id="select-5m" style="width: 100%; padding: 8px; margin-top: 5px; background: rgba(255,255,255,0.1); color: white; border-radius: 5px;">
                                        <option value="">-- Wybierz --</option>
                                    </select>
                                </div>
                                <div style="margin: 15px 0;">
                                    <label>3m:</label>
                                    <select id="select-3m" style="width: 100%; padding: 8px; margin-top: 5px; background: rgba(255,255,255,0.1); color: white; border-radius: 5px;">
                                        <option value="">-- Wybierz --</option>
                                    </select>
                                </div>
                                <div style="margin: 15px 0;">
                                    <label>1m:</label>
                                    <select id="select-1m" style="width: 100%; padding: 8px; margin-top: 5px; background: rgba(255,255,255,0.1); color: white; border-radius: 5px;">
                                        <option value="">-- Wybierz --</option>
                                    </select>
                                </div>
                                <div style="margin: 15px 0;">
                                    <label>🌡️ Otoczenie:</label>
                                    <select id="select-ambient" style="width: 100%; padding: 8px; margin-top: 5px; background: rgba(255,255,255,0.1); color: white; border-radius: 5px;">
                                        <option value="">-- Wybierz --</option>
                                    </select>
                                </div>
                                <button onclick="saveAssignments()" class="btn btn-success" style="width: 100%; margin-top: 20px;">💾 Zapisz przypisania</button>
                            </div>
                            
                            <!-- Podgląd przypisań -->
                            <div>
                                <h3 style="color: #2ecc71;">✅ Aktualne przypisania</h3>
                                <div id="assignments-preview" style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; min-height: 200px;">
                                    <p style="color: #888; text-align: center;">Kliknij Scan aby zobaczyć sensory</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .nav-tabs {
            display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #00d4ff;
        }
        .tab-btn {
            padding: 10px 20px; background: transparent; color: #ccc; border: none; font-size: 1em; cursor: pointer; border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: #00d4ff; border-bottom-color: #00d4ff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        #sensors-list .temp {
            font-size: 1.2em;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        #sensors-list .temp.critical {
            color: #ff4757 !important;
            animation: pulse 1s infinite;
        }
    </style>

    <script>
        // Globals
        let siloAssignments = {
            '5m': null,
            '3m': null,
            '1m': null,
            'ambient': null
        };

        const BACKEND_IP = '192.168.1.12';  // ← TWÓJ IP z ipconfig
        const BACKEND_PORT = '5000';
        const BACKEND_URL = `http://${BACKEND_IP}:${BACKEND_PORT}`;

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        function updateSelects() {
            console.log('🔄 Przywracanie selectów:', siloAssignments);
            
            ['5m', '3m', '1m', 'ambient'].forEach(pos => {
                const select = document.getElementById(`select-${pos}`);
                if (select && siloAssignments[pos]) {
                    // Sprawdź czy opcja istnieje
                    const option = select.querySelector(`option[value="${siloAssignments[pos]}"]`);
                    if (option) {
                        select.value = siloAssignments[pos];
                        console.log(`✅ ${pos}: ${siloAssignments[pos]}`);
                    } else {
                        console.log(`❌ ${pos}: opcja ${siloAssignments[pos]} nie istnieje`);
                    }
                }
            });
        }

        function populateSelects(sensors) {
            // sensors = [{id: "28ff123456789abc"}, ...]
            const options = ['<option value="">-- Wybierz --</option>'];
            
            sensors.forEach(sensor => {
                // Używa sensor.id z obiektu
                options.push(`<option value="${sensor.id}">${sensor.id.slice(-8)} - ${sensor.name || 'Sensor'}</option>`);
            });
            
            // Zachowaj wartości przed zmianą
            const savedValues = {};
            ['5m', '3m', '1m', 'ambient'].forEach(pos => {
                const select = document.getElementById(`select-${pos}`);
                savedValues[pos] = select ? select.value : null;
            });
            
            // Wypełnij select'y
            ['5m', '3m', '1m', 'ambient'].forEach(pos => {
                const select = document.getElementById(`select-${pos}`);
                if (select) {
                    select.innerHTML = options.join('');
                    // Przywróć zapisaną wartość
                    if (savedValues[pos] && select.querySelector(`option[value="${savedValues[pos]}"]`)) {
                        select.value = savedValues[pos];
                    }
                }
            });
        }

        function updateAssignmentsPreview(sensors) {
            const preview = document.getElementById('assignments-preview');
            let html = '<h4 style="margin-bottom: 15px;">Podgląd:</h4>';
            
            ['5m', '3m', '1m', 'ambient'].forEach(pos => {
                const sensorId = siloAssignments[pos];
                const sensor = sensors.find(s => s.id === sensorId);
                const status = sensor ? `✅ ${sensor.id.slice(-8)} (${sensorId})` : '❌ Brak';
                html += `<div style="padding: 8px; border-left: 4px solid ${getColorForPosition(pos)}; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 4px;">
                    <strong>${pos.toUpperCase()}:</strong> ${status}
                </div>`;
            });
            preview.innerHTML = html;
        }

        async function scanSensors() {
            try {
                document.getElementById('status').textContent = 'Skanowanie sensorów...';
                
                const response = await fetch(`${BACKEND_URL}/api/scan`);
                const sensorIds = await response.json();
                
                // 🆕 POPRAW - wyodrębnij ID z obiektów
                const sensors = sensorIds.map(item => item.id); 
                
                renderSensors(sensorIds);           // Lista obiektów [{id: "..."}]
                populateSelects(sensorIds);         // Obiekty z id
                updateAssignmentsPreview(sensorIds); // Obiekty z id
                
                document.getElementById('status').textContent = `${sensorIds.length} sensorów`;
                document.getElementById('status').className = 'status new';
                
            } catch(e) {
                document.getElementById('status').textContent = '❌ Błąd skanu';
                console.error('Scan error:', e);
            }
        }

        async function updateTemps() {
            const temps = await getTemps();
            console.log('📡 Otrzymane temps:', temps);
            
            // 🆕 PRZEKształć format
            const sensorsWithTemps = Object.entries(siloAssignments)
                .map(([pos, sensorId]) => {
                    if (sensorId && temps[sensorId]) {
                        return {
                            id: sensorId,
                            name: pos,
                            temp: temps[sensorId],
                            position: pos
                        };
                    }
                    return null;
                })
                .filter(Boolean);
            
            console.log('🔄 Sensory dla silo:', sensorsWithTemps);
            
            // 🆕 AKTUALIZUJ Sensors + Silo
            if (sensorsWithTemps.length > 0) {
                updateIndividualCharts(sensorsWithTemps);
                updateSensorsDisplay(temps);
            }
        }

        function updateSensorsDisplay(temps) {
            console.log('🔄 updateSensorsDisplay - temps:', temps); // DEBUG
            
            // Użyj data-sensor-id zamiast parsowania tekstu
            const sensorDivs = document.querySelectorAll('#sensors-list .sensor');
            
            sensorDivs.forEach(sensorDiv => {
                const sensorId = sensorDiv.getAttribute('data-sensor-id');
                const tempElement = sensorDiv.querySelector('.temp');
                
                console.log(`Sensor ${sensorId}: temp=${temps[sensorId] ? temps[sensorId].toFixed(1) : 'brak'}`);
                
                if (temps[sensorId]) {
                    const temp = temps[sensorId];
                    tempElement.textContent = temp.toFixed(1) + '°C';
                    
                    // Critical check
                    const ALARM_MIN = -10;
                    const ALARM_MAX = 50;
                    if (temp < ALARM_MIN || temp > ALARM_MAX) {
                        tempElement.classList.add('critical');
                        sensorDiv.style.borderLeft = '4px solid #ff4757';
                        sensorDiv.style.background = 'rgba(255, 71, 87, 0.1)';
                    } else {
                        tempElement.classList.remove('critical');
                        sensorDiv.style.borderLeft = '4px solid #2ecc71';
                        sensorDiv.style.background = 'rgba(46, 204, 113, 0.1)';
                    }
                } else {
                    tempElement.textContent = '--°C';
                    tempElement.classList.remove('critical');
                    sensorDiv.style.borderLeft = '4px solid #95a5a6';
                    sensorDiv.style.background = 'rgba(149, 165, 166, 0.1)';
                }
            });
        }

        function renderSensors(sensorIds) {
            const container = document.getElementById('sensors-list');
            
            container.innerHTML = sensorIds.map(sensor => `
                <div class="sensor 
                    ${siloAssignments['5m'] === sensor.id || 
                    siloAssignments['3m'] === sensor.id || 
                    siloAssignments['1m'] === sensor.id || 
                    siloAssignments['ambient'] === sensor.id ? 'assigned' : 'unassigned'}" 
                    data-sensor-id="${sensor.id}">
                    <div><strong>📍 ${sensor.id}</strong></div>
                    <div class="temp">--°C</div>
                    ${siloAssignments['5m'] === sensor.id ? `<div class="assigned-pos">✅ 5m</div>` :
                    siloAssignments['3m'] === sensor.id ? `<div class="assigned-pos">✅ 3m</div>` :
                    siloAssignments['1m'] === sensor.id ? `<div class="assigned-pos">✅ 1m</div>` :
                    siloAssignments['ambient'] === sensor.id ? `<div class="assigned-pos">✅ Otoczenie</div>` : 
                    `<div class="unassigned">⭕ Unassigned</div>`}
                </div>
            `).join('');
        }

        async function assignSensor(id) {
            const name = document.getElementById(`name-${id}`).value || `Sensor ${id.slice(-8)}`;
            const position = parseFloat(document.getElementById(`pos-${id}`).value) || 0;
            const alarm_min = parseFloat(document.getElementById(`min-${id}`).value) || -5;
            const alarm_max = parseFloat(document.getElementById(`max-${id}`).value) || 40;
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/assign`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, name, position, alarm_min, alarm_max})
                });
                
                if (response.ok) {
                    document.getElementById('status').textContent = `✅ ${name} zapisany!`;
                    document.getElementById('status').className = 'status saved';
                    setTimeout(scanSensors, 1000);
                }
            } catch(e) {
                document.getElementById('status').textContent = '❌ Błąd zapisu';
                document.getElementById('status').className = 'status';
            }
        }

        function updateIndividualCharts(sensors) {
            const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // 🆕 Obsługa obu formatów (dla kompatybilności)
            const _5m = sensors.find(s => s.id === siloAssignments['5m'] || s.position === '5m');
            const _3m = sensors.find(s => s.id === siloAssignments['3m'] || s.position === '3m');
            const _1m = sensors.find(s => s.id === siloAssignments['1m'] || s.position === '1m');
            const ambient = sensors.find(s => s.id === siloAssignments['ambient'] || s.position === 'ambient');
            
            console.log('🎯 Znalezione sensory:', { _5m: _5m?.temp, _3m: _3m?.temp, _1m: _1m?.temp, ambient: ambient?.temp });
            
            // Reszta bez zmian - updateTempDisplay()...
            function updateTempDisplay(id, temp, isCritical) {
                const element = document.getElementById(id);
                if (element) {
                    element.textContent = temp ? temp.toFixed(1) + '°C' : '--°C';
                    if (isCritical) {
                        element.classList.add('critical');
                    } else {
                        element.classList.remove('critical');
                    }
                }
            }
            
            const ALARM_MIN = -10;
            const ALARM_MAX = 50;
            
            updateTempDisplay('5m-temp', _5m?.temp, _5m?.temp && (_5m.temp < ALARM_MIN || _5m.temp > ALARM_MAX));
            updateTempDisplay('3m-temp', _3m?.temp, _3m?.temp && (_3m.temp < ALARM_MIN || _3m.temp > ALARM_MAX));
            updateTempDisplay('1m-temp', _1m?.temp, _1m?.temp && (_1m.temp < ALARM_MIN || _1m.temp > ALARM_MAX));
            updateTempDisplay('ambient-temp', ambient?.temp, ambient?.temp && (ambient.temp < ALARM_MIN || ambient.temp > ALARM_MAX));
            
            // Wykresy
            const positions = { '5m': _5m, '3m': _3m, '1m': _1m, 'ambient': ambient };
            Object.keys(positions).forEach(pos => {
                const sensor = positions[pos];
                if (sensor && sensor.temp !== null && sensor.temp !== undefined) {
                    history[pos].push({time: now, temp: sensor.temp});
                    if (history[pos].length > 20) history[pos].shift();
                    console.log(`📈 Updating ${pos}: ${sensor.temp}°C`);
                }
                updateSingleChart(pos, history[pos]);
            });
        }

        function updateSingleChart(position, data) {
            const canvas = document.getElementById(`chart-${position}`);
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            
            if (!charts[position]) {
                // Stwórz nowy wykres
                charts[position] = new Chart(ctx, {
                    type: 'line',
                    data: { labels: [], datasets: [{
                        label: `${position.toUpperCase()} (°C)`,
                        data: [],
                        borderColor: getColorForPosition(position),
                        backgroundColor: getColorForPosition(position, 0.1),
                        tension: 0.4,
                        fill: true,
                        pointRadius: 3
                    }]},
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { 
                                beginAtZero: false,
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { color: '#e0e0e0' }
                            },
                            x: { 
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { color: '#b0b0b0', maxRotation: 45 }
                            }
                        },
                        plugins: { 
                            legend: { labels: { color: '#e0e0e0' } },
                            title: { display: false }
                        }
                    }
                });
            }
            
            // Aktualizuj dane
            charts[position].data.labels = data.map(d => d.time);
            charts[position].data.datasets[0].data = data.map(d => d.temp);
            charts[position].update('none');
        }

        function getColorForPosition(pos) {
            const colors = {
                '5m': '#00d4ff',
                '3m': '#ff6b6b', 
                '1m': '#f39c12',
                'ambient': '#2ecc71'
            };
            return colors[pos] || '#ffffff';
        }

        function getColorForPosition(pos, alpha) {
            const colors = {
                '5m': 'rgba(0,212,255,0.1)',
                '3m': 'rgba(255,107,107,0.1)',
                '1m': 'rgba(243,156,18,0.1)', 
                'ambient': 'rgba(46,204,113,0.1)'
            };
            return colors[pos] || 'rgba(255,255,255,0.1)';
        }

        async function getTemps() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/temps`);
                return await response.json();
            } catch(e) {
                console.error('Błąd temperatur:', e);
                return [];
            }
        }
        
        async function loadAssignments() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/assignments`);
                siloAssignments = await response.json();
                console.log('📥 Backend assignments:', siloAssignments);
            } catch(e) {
                console.error('Brak backendu, default:', e);
                siloAssignments = {'5m':null,'3m':null,'1m':null,'ambient':null};
            }
        }

        async function saveAssignments() {
            siloAssignments = {
                '5m': document.getElementById('select-5m').value || null,
                '3m': document.getElementById('select-3m').value || null,
                '1m': document.getElementById('select-1m').value || null,
                'ambient': document.getElementById('select-ambient').value || null
            };
            
            await fetch(`${BACKEND_URL}/api/assignments`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(siloAssignments)
            });
            
            console.log('💾 Backend ZAPISANO!');
            await updateTemps();
        }

        // Obiekty wykresów
        let charts = {
            '5m': null,
            '3m': null, 
            '1m': null,
            'ambient': null
        };

        // Historia danych (max 50 próbek)
        let history = {
            '5m': [],
            '3m': [],
            '1m': [],
            'ambient': []
        };

        async function initApp() {
            await loadAssignments();
            await scanSensors();
            updateSelects();
            await updateTemps();
            setInterval(updateTemps, 5000);
        }

        initApp();
    </script>
</body>
</html>
